<!-- 여행 기록 화면 -->
 <!-- 내용 : 3개의 여행 기록과 브이로그 기록, media 파일에서 가져오기-->
 <!-- 스타일: grid 나눔, 애니메이션 사용  -->


<!DOCTYPE html>
<html lang = 'kor'>
    <head>
        <meta charset="UTF-8">
        <meta name = "viewport" content = "width = device-width, initial-scale=1.0">
        <title>나의 여행지</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Orbit&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../css/style.css">

        <!-- 다크모드 -->
        <button id="dark-mode-toggle">🌙 다크 모드</button>

    </head>

    <body>
        <!-- 브금 -->
        <div class = container>
        <div>
        <h1><b>😎 나의 여행 앨범 🌍</b></h1>
        <audio controls>
            <source src="../media/music.mp3" type="audio/mpeg">
            <source src="music.ogg" type="audio/ogg">
            현재 브라우저가 오디오 태그를 지원하지 않습니다.
        </audio>

        <hr>
        
        <!-- 사진앨범 -->
        <div class = "trip-grid">
        <div class="trip-card">
        <picture>
            <img src="../media/경주.JPG" alt="경주" width="320" height="240">
        </picture>
        <figcaption>경주 여행(2024)</figcaption>
        <small>
            <ul>
                <li>여름에 간 경주 여행
                <li>경주에서 먹은 얼굴빵이 참 맛있었다</li>
            </ul>
        </li></small>
        </div>
    


        <div class="trip-card">
        <picture>
            <img src="../media/훗카이도.jpg" alt="훗카이도" width="240" height="400">
        </picture>
        <figcaption>훗카이도 여행(2025)</figcaption>
        <small>
            <ul>
                <li>처음 가본 훗카이도
                <li>초밥을 100개 먹었다🤭</li>
            </ul>
        </li></small>
        </div>



        <div class="trip-card">
        <picture>
            <img src="../media/배그.JPG" alt="이스포츠" width="240" height="360">
        </picture>
        <figcaption>이스포츠 직관(2025)</figcaption>
        <small>
            <ul>
                <li>내가 좋아하는 스포츠 중 하나인 이스포츠
                <li>좋아하는 선수에게 싸인을 받아 행복했다</li>
            </ul>
        </li></small>
        </div>
        
       
        </div>
    
    <br>
    <hr>
    
    <!-- 브이로그 -->
    <div class="vlog-card">
    <h3>🎥 나의 여행 브이로그 🎵</h3>
    <video width="320" height="240" controls poster="../media/썸네일.jpg">
        <source src="../media/브이로그.mp4" type="video/mp4">
        <source src="브이로그.MOV" type="video/MOV">
        현재 브라우저가 비디오 태그를 지원하지 않습니다.
    </video>
    <p><span style="padding-left: 40px;">유니버셜 스튜디오에서 한 컷</span></p>
    <a href="https://youtu.be/Y5ATmB-aJsE" target="_blank" class="btn-link">🔗 브이로그 보러가기</a>
    </div>

</div>

</div>

    <!-- 다크모드 -->
    <script src="../script/darkMode.js"></script>
    </body>

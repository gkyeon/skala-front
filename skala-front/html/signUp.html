<!-- 회원가입 화면 -->
 <!-- 내용 : 계정정보, 프로필 정보, 자기소개 -->
 <!-- 스타일: input 애니메이션-->

<!DOCTYPE html>
<html lang = 'kor'>
    <head>
        <meta charset="UTF-8">
        <meta name = "viewport" content = "width = device-width, initial-scale=1.0">
        <title>회원가입</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Orbit&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="/css/style.css">


        <!-- 다크모드 -->
        <button id="dark-mode-toggle">🌙 다크 모드</button>
    </head>


    <body>
        <div class = container>
        <div>
        <h1><b>📑 회원가입</b></h1>
        <p>SKALA-FRONT 회원가입을 환영합니다.</p>
        <hr>
        <form action="signUpResult.html" method="get">
            <fieldset>
                <legend>계정 정보</legend>
                <p>
                    <label for ="userId">아이디: </label>
                    <input type = "text" id = "userId" name = "userId" minlength="4" maxlength="15" required placeholder="4~15자 영문/숫자">
                    <small>(필수)</small>
                </p>
                <p>
                    <label for ="userPW">비밀번호: </label>
                    <input type = "text" id = "userPW" name = "userPW" minlength="8" required placeholder="8자 이상 입력">
                    <small>(필수)</small>
                </p>
                <p>
                    <label for ="userEmail">이메일: </label>
                    <input type = "text" id = "userEmail" name = "userEmail" placeholder="example">
                    @
                    <select name = "emailDomain">
                        <option value = "direct">직접 입력</option>
                        <option value = "naver.com">naver.com</option>
                        <option value = "gmail.com">gmail.com</option>
                        <option value = "daum.net">daum.net</option>
                    </select>
                </p>
            </fieldset>
            <br>
            <fieldset>
                <legend>개인 프로필 정보</legend>
                <p>
                    <label for="UserName">이름: </label>
                    <input type="text" id="UserName" name="UserName" required>
                </p>
                <p>
                    <label for="userBirth">생년월일: </label>
                    <input type="date" id="userBirth" name="userBirth">
                </p>
                <p>
                    성별:
                    <label><input type = "radio" name="gender" value="male" checked>남성</label>
                    <label><input type = "radio" name="gender" value="female">여성</label>
                    <label><input type = "radio" name="gender" value="none">선택안함</label>
                </p>
                <p>
                    관심 분야 (중복 선택 가능): <br>
                    <label class="checkbox-item"><input type="checkbox" name="interset" value="frontend">웹 프론트엔드(Vue.js/HTML) </label><br>
                    <label class="checkbox-item"><input type="checkbox" name="interset" value="uiux">UI/UX 디자인 표준 </label><br>
                    <label class="checkbox-item"><input type="checkbox" name="interset" value="backend">백엔드 & 데이터베이스 </label><br>
                    <label class="checkbox-item"><input type="checkbox" name="interset" value="devops">클라우드 & 인프라 </label><br>

                </p>
                <p>
                    <label for="route">가입 경로: </label>
                    <select id = "route" name="route">
                        <option value="" disabled selected>--선택해 주세요--</option>
                        <option value="officialhompage">공식 홈페이지</option>
                        <option value="SNS">SNS</option>
                        <option value="freind">지인 소개</option>
                        <option value="etc">기타</option>
                    </select>
                </p>
            </fieldset>
            <br>
            <fieldset>
                <legend>자기소개</legend>
                <p>
                    <label for="intro">나를 표현하는 한 줄 소개 또는 가입 인사: </label><br>
                    <textarea id="intro" name="intro" rows="5" cols="50" placeholder="여기에 내용을 입력하세요 (최대 200자)"></textarea>
                </p>
            </fieldset>
            <br>
            <input type="submit" value="동의하고 회원가입">
            <input type="reset" value="다시 작성">   
        </form>
        </div>
        </div>
        <!-- 다크모드 -->
        <script src="/script/darkMode.js"></script>
    </body>
</html>
